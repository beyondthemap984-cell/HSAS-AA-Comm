<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#FF6B00"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="AA Alarm"/>
<title>AA Alarm CRM</title>
<link rel="manifest" href="manifest.json"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--or:#EA580C;--ord:#C2410C;--bg:#FFF7F0;--card:#FFFFFF;--card2:#FEF3E8;--bdr:#FDBA74;--txt:#1C0F00;--mut:#78716C;--dim:#FDE8D0;--grn:#16A34A;--red:#DC2626;--ylw:#D97706;--blu:#2563EB;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--txt);max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden;}
input,select,textarea,button{font-family:'Barlow',sans-serif;}
::-webkit-scrollbar{width:0;}
.screen{display:none;}.screen.active{display:block;}
#hdr{background:var(--bg);padding:12px 16px 10px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,247,240,0.97);backdrop-filter:blur(16px);border-top:1px solid var(--bdr);display:flex;padding:8px 0 max(16px,env(safe-area-inset-bottom));z-index:200;}
.nb{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 0;}
.ni{width:40px;height:28px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;}
.ni.act{background:rgba(255,107,0,.22);}
.nl{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--mut);}
.nl.act{color:var(--or);font-weight:800;}
#mc{overflow-y:auto;height:calc(100vh - 118px);padding:14px 14px 8px;}
.card{background:var(--card);border-radius:14px;padding:14px;border:1px solid var(--bdr);margin-bottom:10px;}
.c2{background:var(--card2);border-radius:12px;padding:12px 14px;border:1px solid var(--bdr);margin-bottom:8px;}
.btn{padding:12px 16px;border-radius:12px;border:none;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;}
.bor stroke{background:linear-gradient(135deg,var(--or),var(--ord));color:#fff;box-shadow:0 4px 16px rgba(255,107,0,.35);}
.bor{background:linear-gradient(135deg,var(--or),var(--ord));color:#fff;box-shadow:0 4px 16px rgba(255,107,0,.35);}
.bg{background:linear-gradient(135deg,var(--grn),#16a34a);color:#fff;}
.br{background:transparent;color:var(--red);border:1.5px solid var(--red);}
.bo{background:transparent;color:var(--mut);border:1.5px solid var(--bdr);}
.bsm{padding:7px 12px;font-size:11px;border-radius:9px;}
.bfl{width:100%;}
.fl{color:var(--mut);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:5px;}
.fi{width:100%;padding:11px 13px;border-radius:11px;background:var(--card2);border:1.5px solid var(--bdr);color:var(--txt);font-size:14px;font-family:'Barlow',sans-serif;outline:none;-webkit-appearance:none;}
.fi:focus{border-color:var(--or);}
.fw{margin-bottom:13px;}
.bdg{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
#mov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;align-items:flex-end;justify-content:center;}
#mov.open{display:flex;}
#mbox{width:100%;max-width:480px;background:var(--card);border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;border:1px solid var(--bdr);border-bottom:none;}
.mhdr{padding:15px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bdr);position:sticky;top:0;background:var(--card);z-index:10;}
.mbody{padding:16px 18px 40px;}
#toast{display:none;position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}
.sb{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:12px;padding:10px 13px;border:1.5px solid var(--bdr);margin-bottom:10px;}
.sb input{flex:1;background:transparent;border:none;outline:none;color:var(--txt);font-size:14px;font-family:'Barlow',sans-serif;}
.pills{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;}
.pill{padding:6px 11px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:1.5px solid var(--bdr);background:var(--card);color:var(--mut);font-family:'Barlow',sans-serif;}
.pill.act{background:var(--or);color:#fff;border-color:var(--or);}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.sc{background:var(--card);border-radius:14px;padding:13px;border:1px solid var(--bdr);}
.sv{font-size:22px;font-weight:900;line-height:1.1;}
.sl{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin-bottom:4px;}
.stl{color:var(--mut);font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}
.pb{height:6px;background:var(--dim);border-radius:3px;overflow:hidden;}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--or),var(--ord));}
.qty-ctrl{display:flex;align-items:center;gap:7px;}
.qb{width:30px;height:30px;border-radius:8px;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.qm{background:var(--card2);color:var(--txt);border:1px solid var(--bdr);}
.qp{background:var(--or);color:#fff;}
.qn{min-width:20px;text-align:center;font-size:14px;font-weight:700;}
#ls{min-height:100vh;display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px 22px;}
#ls.active{display:flex;}
.rtab{flex:1;padding:9px 0;border-radius:9px;border:none;background:transparent;color:var(--mut);font-family:'Barlow',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;cursor:pointer;}
.rtab.active{background:var(--or);color:#fff;}
</style>
</head>
<body>

<div id="ls" class="active">
  <div style="width:80px;height:80px;border-radius:20px;background:linear-gradient(135deg,#FF6B00,#CC5500);display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:900;color:#fff;margin-bottom:14px;box-shadow:0 0 40px rgba(255,107,0,.4);">AA</div>
  <div style="font-size:24px;font-weight:900;margin-bottom:4px;">AA Alarm CRM</div>
  <div style="color:var(--mut);font-size:11px;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase;">Alarm System Management</div>
  <div style="color:var(--or);font-size:11px;font-weight:700;margin-bottom:28px;">🛡 Alarm System Solutions</div>
  <div style="display:flex;background:var(--card);border-radius:13px;padding:4px;margin-bottom:18px;width:100%;border:1px solid var(--bdr);">
    <button class="rtab active" data-role="superadmin" onclick="selRole(this)">Super Admin</button>
    <button class="rtab" data-role="admin" onclick="selRole(this)">Admin</button>
    <button class="rtab" data-role="user" onclick="selRole(this)">User</button>
    <button class="rtab" data-role="pta" onclick="selRole(this)">PTA</button>
  </div>
  <div class="fw" style="width:100%"><label class="fl">Username</label><input class="fi" id="lu" value="superadmin"/></div>
  <div class="fw" style="width:100%"><label class="fl">Password</label><input class="fi" id="lp" type="password" placeholder="Password"/><div id="lhint" style="display:none;"></div></div>
  <div class="fw" style="width:100%">
    <label class="fl">Security Check</label>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
      <div id="captcha-box" style="background:linear-gradient(135deg,#1C0F00,#3d1f00);padding:10px 18px;border-radius:10px;font-size:20px;font-weight:900;letter-spacing:6px;color:#FF6B00;font-family:monospace;user-select:none;border:2px solid var(--bdr);min-width:130px;text-align:center;"></div>
      <button type="button" onclick="genCaptcha()" style="background:var(--card2);border:1.5px solid var(--bdr);border-radius:10px;padding:10px 13px;cursor:pointer;font-size:16px;">&#x1F504;</button>
    </div>
    <input class="fi" id="lcap" placeholder="Upar likha code yahan darj karein" autocomplete="off"/>
  </div>
  <div style="color:var(--red);font-size:12px;margin-bottom:10px;min-height:16px;" id="lerr"></div>
  <button class="btn bor bfl" id="login-btn" onclick="doLogin()">Sign In →</button>
</div>

<div id="hdr" style="display:none;">
  <div style="display:flex;align-items:center;gap:9px;">
    <div style="width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--or),var(--ord));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;">AA</div>
    <div><div style="font-size:13px;font-weight:800;">AA Alarm CRM</div><div style="font-size:10px;color:var(--mut);">Alarm Systems Management</div></div>
  </div>
  <div class="bdg" id="hbadge" style="background:rgba(255,107,0,.2);color:var(--or);">Admin</div>
</div>

<div id="mc" style="display:none;">
  <div id="tab-dash" class="screen active">
    <div style="margin-bottom:16px;">
      <div style="color:var(--mut);font-size:12px;">Welcome,</div>
      <div style="font-size:21px;font-weight:900;" id="hgreet">Admin</div>
    </div>
    <div class="sgrid">
      <div class="sc" style="cursor:pointer;" onclick="goTab('customers')"><div class="sl">Total Customers</div><div class="sv" style="color:var(--or);" id="s-total">0</div></div>
      <div class="sc" style="cursor:pointer;" onclick="goTab('customers')"><div class="sl">Active</div><div class="sv" style="color:var(--grn);" id="s-active">0</div></div>
    </div>
    <div class="sgrid" style="margin-bottom:16px;">
      <div class="sc" style="cursor:pointer;" onclick="goTab('invoices')"><div class="sl">Total Revenue</div><div class="sv" style="color:var(--grn);font-size:14px;" id="s-rev">₨0</div></div>
      <div class="sc" style="cursor:pointer;" onclick="goTab('invoices')"><div class="sl">Unpaid Invoices</div><div class="sv" style="color:var(--red);" id="s-inv">0</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      <button class="card" onclick="openM('add-cust')" style="cursor:pointer;text-align:left;border:1px solid var(--bdr);"><div style="font-size:22px;margin-bottom:6px;">👤</div><span style="font-size:13px;font-weight:700;">Add Customer</span></button>
      <button class="card" onclick="openM('new-invoice')" style="cursor:pointer;text-align:left;border:1px solid var(--bdr);"><div style="font-size:22px;margin-bottom:6px;">🧾</div><span style="font-size:13px;font-weight:700;">New Invoice</span></button>
      <button class="card" onclick="goTab('customers')" style="cursor:pointer;text-align:left;border:1px solid var(--bdr);"><div style="font-size:22px;margin-bottom:6px;">📋</div><span style="font-size:13px;font-weight:700;">Customers</span></button>
      <button class="card" onclick="goTab('invoices')" style="cursor:pointer;text-align:left;border:1px solid var(--bdr);"><div style="font-size:22px;margin-bottom:6px;">💰</div><span style="font-size:13px;font-weight:700;">Invoices</span></button>
    </div>
    <div class="stl">Recent Invoices</div>
    <div id="recent-list"></div>
  </div>

  <div id="tab-customers" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div style="font-size:20px;font-weight:900;" id="cust-heading">Customers <span style="color:var(--mut);font-size:14px;" id="ccount"></span></div>
      <button class="btn bor bsm" onclick="openM('add-cust')">+ Add</button>
    </div>
    <div class="sb"><span>🔍</span><input id="csearch" placeholder="Name, mobile..." oninput="renderCusts()"/></div>
    <div id="custs-list"></div>
  </div>

  <div id="tab-invoices" class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <div style="font-size:20px;font-weight:900;">Invoices</div>
      <button class="btn bor bsm" onclick="openM('new-invoice')">+ New</button>
    </div>
    <div id="inv-list"></div>
  </div>
  
  <div id="tab-settings" class="screen">
    <div style="font-size:20px;font-weight:900;margin-bottom:16px;">Settings</div>
    <button class="btn br bfl" onclick="doLogout()">Sign Out</button>
  </div>
</div>

<div id="bnav" style="display:none;">
  <button class="nb" onclick="goTab('dash')"><div class="ni act" id="ni-dash">🏠</div><span class="nl act" id="nl-dash">Home</span></button>
  <button class="nb" onclick="goTab('customers')"><div class="ni" id="ni-customers">👥</div><span class="nl" id="nl-customers">Customers</span></button>
  <button class="nb" onclick="goTab('invoices')"><div class="ni" id="ni-invoices">🧾</div><span class="nl" id="nl-invoices">Invoices</span></button>
  <button class="nb" onclick="goTab('settings')"><div class="ni" id="ni-settings">⚙️</div><span class="nl" id="nl-settings">Settings</span></button>
</div>

<div id="toast"></div>
<div id="mov">
  <div id="mbox">
    <div class="mhdr"><span style="font-size:17px;font-weight:800;" id="mtitle">—</span><button onclick="closeM()">✕</button></div>
    <div class="mbody" id="mbody"></div>
  </div>
</div>

<script>
const ITEMS=[
  {id:"alarm_panel",name:"Alarm Panel",price:3500},
  {id:"door_contact",name:"Door Contact",price:450}
];
const fmt=n=>"₨ "+Number(n||0).toLocaleString("en-PK");

function loadS(){return{
  role:null,uid:null,
  custs:JSON.parse(localStorage.getItem('alm_custs')||'[]'),
  invoices:JSON.parse(localStorage.getItem('alm_invoices')||'[]'),
  prices:JSON.parse(localStorage.getItem('alm_prices')||'null')||Object.fromEntries(ITEMS.map(i=>[i.id,i.price])),
  users:[
    {id:"U1",username:"superadmin",password:"super123",name:"Super Administrator",role:"superadmin",status:"active"},
    {id:"U2",username:"admin",password:"admin123",name:"Administrator",role:"admin",status:"active"}
  ],
  projFilter:'all', invFilter:'all'
};}
let S=loadS();

// ===== FIREBASE CONFIGURATION =====
const firebaseConfig = {
  apiKey: "AIzaSyAs8_fI8YfLg-8mJ0WfM2m0O-YgB6gW-8k",
  authDomain: "aa-alarm.firebaseapp.com",
  databaseURL: "https://aa-alarm-default-rtdb.firebaseio.com",
  projectId: "aa-alarm",
  storageBucket: "aa-alarm.appspot.com",
  messagingSenderId: "36735515286",
  appId: "1:36735515286:web:7dc30e062d98c7161b9b18"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let _syncTimer = null;
function sv() {
  localStorage.setItem('alm_custs', JSON.stringify(S.custs));
  localStorage.setItem('alm_invoices', JSON.stringify(S.invoices));
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(syncToFirebase, 400);
}

function syncToFirebase() {
  db.ref('crm_data').set({
    custs: S.custs,
    invoices: S.invoices
  }).catch(e => console.error('Firebase save error:', e));
}

function listenToFirebase() {
  const btn = document.getElementById('login-btn');
  if (btn) {
    btn.disabled = true;
    btn.textContent = "Loading Server Data...";
  }

  db.ref('crm_data').on('value', (snapshot) => {
    const d = snapshot.val();
    if (d) {
      S.custs = d.custs || S.custs;
      S.invoices = d.invoices || S.invoices;
      localStorage.setItem('alm_custs', JSON.stringify(S.custs));
      localStorage.setItem('alm_invoices', JSON.stringify(S.invoices));
    }
    if (btn) {
      btn.disabled = false;
      btn.textContent = 'Sign In →';
    }
  });
}

// ===== CAPTCHA & LOGIN SYSTEM =====
let captchaVal = '';
function genCaptcha() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  captchaVal = Array.from({length:5}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
  const el = document.getElementById('captcha-box');
  if (el) el.textContent = captchaVal;
}

function selRole(btn) {
  document.querySelectorAll('.rtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const role = btn.getAttribute('data-role');
  document.getElementById('lu').value = role;
}

function showToast(m) {
  const el = document.getElementById('toast');
  if(el) { el.textContent = m; el.style.display = 'block'; setTimeout(() => el.style.display='none', 2000); }
}

function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value.trim();
  const c = document.getElementById('lcap').value.trim().toUpperCase();
  const err = document.getElementById('lerr');

  if(c !== captchaVal) { err.textContent = "Security Code (CAPTCHA) galat hai!"; genCaptcha(); return; }
  
  const user = S.users.find(x => x.username === u && x.password === p);
  if(!user) { err.textContent = "Username ya Password galat hai!"; return; }

  S.role = user.role; S.uid = user.id;
  document.getElementById('ls').classList.remove('active');
  document.getElementById('hdr').style.display = 'flex';
  document.getElementById('mc').style.display = 'block';
  document.getElementById('bnav').style.display = 'flex';
  document.getElementById('hgreet').textContent = user.name;
  document.getElementById('hbadge').textContent = user.role.toUpperCase();
  
  renderDash();
  showToast("Welcome Back! ✓");
}

function doLogout() {
  S.role = null; S.uid = null;
  document.getElementById('ls').classList.add('active');
  document.getElementById('hdr').style.display = 'none';
  document.getElementById('mc').style.display = 'none';
  document.getElementById('bnav').style.display = 'none';
  document.getElementById('lp').value = '';
  document.getElementById('lcap').value = '';
  genCaptcha();
}

function goTab(t) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.ni, .nl').forEach(e => e.classList.remove('act'));
  
  const scr = document.getElementById('tab-' + t);
  if(scr) scr.classList.add('active');
  
  const ni = document.getElementById('ni-' + t), nl = document.getElementById('nl-' + t);
  if(ni) ni.classList.add('act'); if(nl) nl.classList.add('act');

  if(t==='dash') renderDash();
  if(t==='customers') renderCusts();
  if(t==='invoices') renderInvoices();
}

function openM(type) { document.getElementById('mov').classList.add('open'); document.getElementById('mtitle').textContent = type.toUpperCase(); }
function closeM() { document.getElementById('mov').classList.remove('open'); }

function renderDash() {
  document.getElementById('s-total').textContent = S.custs.length;
  document.getElementById('s-active').textContent = S.custs.filter(c => c.status === 'active').length;
  let rev = S.invoices.filter(i => i.status === 'paid').reduce((a, b) => a + (b.total || 0), 0);
  document.getElementById('s-rev').textContent = fmt(rev);
  document.getElementById('s-inv').textContent = S.invoices.filter(i => i.status === 'unpaid').length;
}

function renderCusts() {
  const container = document.getElementById('custs-list');
  if(!container) return;
  if(S.custs.length === 0) { container.innerHTML = '<div style="text-align:center;color:var(--mut);padding:20px;">Koi customers nahi hain.</div>'; return; }
  container.innerHTML = S.custs.map(c => `<div class="card"><strong>${c.name}</strong><br><span style="color:var(--mut); font-size:12px;">Mobile: ${c.mobile} | Status: ${c.status}</span></div>`).join('');
}

function renderInvoices() {
  const container = document.getElementById('inv-list');
  if(!container) return;
  if(S.invoices.length === 0) { container.innerHTML = '<div style="text-align:center;color:var(--mut);padding:20px;">Koi invoices nahi hain.</div>'; return; }
  container.innerHTML = S.invoices.map(i => `<div class="card"><strong>Inv ID: ${i.id}</strong><br><span style="color:var(--mut); font-size:12px;">Total: ${fmt(i.total)} | Status: ${i.status}</span></div>`).join('');
}

// ===== SEED INITIALIZATION =====
if (S.custs.length === 0) {
  S.custs = [
    {id:"A001",name:"Bilal Khan",mobile:"0321-9876543",status:"active"},
    {id:"A002",name:"Sara Ali",mobile:"0333-4567890",status:"inactive"}
  ];
  S.invoices = [
    {id:"ALM-001",custId:"A001",date:"2025-05-20",status:"unpaid",total:6800}
  ];
  sv();
}

// ===== INITIAL LOAD =====
document.addEventListener("DOMContentLoaded", () => {
  genCaptcha();
  setTimeout(listenToFirebase, 800);
});
</script>
</body>
</html>
